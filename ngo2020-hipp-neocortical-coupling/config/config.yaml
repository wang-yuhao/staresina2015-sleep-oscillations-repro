# =============================================================================
# Ngo et al. (2020) Reproduction Pipeline — Configuration
# Paper: Sleep spindles mediate hippocampal-neocortical coupling during
#        long-duration ripples. eLife 9:e57011
# =============================================================================

# --- Data paths ---
paths:
  raw_data: "data/raw"              # Directory containing subject .mat files
  processed_data: "data/processed"  # Preprocessed outputs
  detections: "data/processed/detections"  # Spindle & ripple event files
  results: "results"                # Figures and statistics
  figures: "results/figures"
  stats: "results/stats"

# --- Dataset info ---
dataset:
  n_subjects: 14                   # 14 pre-surgical epilepsy patients
  osf_doi: "10.17605/OSF.IO/3HPVR"
  osf_url: "https://osf.io/3hpvr/"
  original_code_url: "https://github.com/episodicmemorylab/Ngo_et_al_eLife2020"

# --- Recording parameters ---
recording:
  srate: 1000                      # Sampling rate in Hz (verify after loading)
  nc_channel: "Cz"                 # Neocortex: scalp electrode Cz
  hipp_channel: "HIPP"             # Hippocampus: posterior intracranial electrode
  sleep_stage: "NREM"              # Analyze NREM sleep only

# --- Spindle detection (Staresina et al. 2015 / Ngo et al. 2020) ---
spindle_detection:
  bandpass_low: 12                 # Hz - spindle band low cutoff
  bandpass_high: 16                # Hz - spindle band high cutoff
  rms_window_ms: 200               # ms - RMS window length
  rms_smooth_ms: 200               # ms - smoothing window length
  threshold_low_sd: 2.5            # SD above mean (detection threshold)
  threshold_high_sd: 9.0           # SD above mean (upper limit / artifact)
  min_duration_ms: 500             # ms - minimum spindle duration
  max_duration_ms: 3000            # ms - maximum spindle duration
  channels: ["NC", "HIPP"]         # Detect spindles in both channels

# --- Ripple detection (Staresina et al. 2015 / Ngo et al. 2020) ---
ripple_detection:
  bandpass_low: 80                 # Hz - ripple band low cutoff
  bandpass_high: 100               # Hz - ripple band high cutoff
  rms_window_ms: 20                # ms - RMS window for ripple detection
  threshold_sd: 5.0                # SD above mean
  min_duration_ms: 38              # ms - 3 cycles at 80 Hz minimum
  max_duration_ms: 500             # ms - maximum ripple duration
  min_cycles: 3                    # Minimum number of cycles in raw signal
  epoch_window_s: 1.0              # Seconds each side for epoching (2s total)
  channel: "HIPP"                  # Only detect in hippocampus

# --- Control event matching ---
control_events:
  # Ripple-free intervals matched to ripple events for normalization
  min_distance_from_ripple_s: 2.0  # Minimum distance from any ripple (seconds)
  n_matched_per_ripple: 3          # Number of control events per ripple

# --- Time-frequency representation (TFR) ---
tfr:
  method: "morlet"                 # Wavelet method
  freqs_low: 4                     # Hz - lowest frequency
  freqs_high: 30                   # Hz - highest frequency
  n_freqs: 27                      # Number of frequency bins
  n_cycles: 5                      # Morlet wavelet cycles (or freq-dependent)
  baseline_window: [-1.0, -0.5]    # Seconds: baseline normalization window
  epoch_tmin: -1.0                 # Epoch start relative to ripple peak (s)
  epoch_tmax: 1.0                  # Epoch end relative to ripple peak (s)
  decim: 1                         # Decimation factor (1 = no decimation)

# --- Coherence analysis ---
coherence:
  method: "coh"                    # Magnitude-squared coherence
  fmin: 10                         # Hz - min frequency for coherence
  fmax: 20                         # Hz - max frequency for coherence
  spindle_band: [12, 16]           # Hz - spindle band for reporting
  n_cycles: 5                      # Cycles for spectral estimation
  epoch_tmin: -1.0
  epoch_tmax: 1.0

# --- Partial Directed Coherence (PDC) ---
pdc:
  model_order: 10                  # MVAR model order
  n_bootstrap: 1000                # Bootstrap iterations for significance
  # Reduce to 200 for faster (less accurate) results
  alpha: 0.05                      # Significance level
  spindle_band: [12, 16]           # Hz
  direction_nc_to_hipp: true       # Compute NC -> HIPP
  direction_hipp_to_nc: true       # Compute HIPP -> NC

# --- Ripple duration analysis ---
ripple_duration:
  split_method: "median"           # Median split into long/short groups
  # Alternative: use specific percentiles
  short_percentile: 50             # Below median = short
  long_percentile: 50              # Above median = long
  stat_test: "ttest_ind"           # One-sided independent t-test
  stat_direction: "greater"        # Long > short (one-sided)

# --- Cluster-based permutation statistics ---
cluster_stats:
  n_permutations: 1000
  alpha: 0.05
  tail: 0                          # Two-tailed
  seed: 42                         # Random seed for reproducibility

# --- Plotting ---
plotting:
  dpi: 300
  figure_format: "png"             # png or pdf
  colormap_tfr: "RdBu_r"          # Diverging colormap for TFR
  colormap_coherence: "viridis"
  font_size: 12
  spindle_color: "#2196F3"         # Blue for spindle band
  ripple_color: "#F44336"          # Red for ripple
  nc_color: "#4CAF50"              # Green for neocortex
  hipp_color: "#FF9800"            # Orange for hippocampus
