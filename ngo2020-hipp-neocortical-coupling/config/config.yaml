# =============================================================================
# Ngo et al. (2020) Reproduction Pipeline — Configuration
# Paper: Sleep spindles mediate hippocampal-neocortical coupling during
#        long-duration ripples. eLife 9:e57011
# =============================================================================

# --- Data paths ---
paths:
  raw_data: "data/raw"                          # Downloaded OSF data
  processed_data: "data/processed"              # Organized & validated data
  detections: "data/processed/detections"       # Spindle & ripple event files  
  results: "results"                            # Analysis outputs
  figures: "results/figures"                    # Generated figures
  stats: "results/stats"                        # Statistical test results

# --- Dataset info ---
dataset:
  n_subjects: 14                                # 14 pre-surgical epilepsy patients
  patient_ids: ["pat01", "pat02", "pat03", "pat04", "pat05", "pat06", "pat07",
                "pat08", "pat09", "pat10", "pat11", "pat12", "pat13", "pat14"]
  osf_doi: "10.17605/OSF.IO/3HPVR"
  osf_url: "https://osf.io/3hpvr/"
  original_code_url: "https://github.com/episodicmemorylab/Ngo_et_al_eLife2020"

# --- Data structure (actual OSF organization) ---
data_folders:
  eegs: "EEGs"                                  # Raw EEG recordings
  ripples: "Ripples"                            # Detected ripple events
  spindles: "Spindles"                          # Detected spindle events
  control_events: "ControlEvents/ngo_et_al_eLife2020_controlData_100sets"

# --- Recording parameters ---
recording:
  srate: 1000                                   # Sampling rate in Hz (verify after loading)
  nc_channel: "Cz"                              # Neocortex: scalp electrode Cz
  hipp_channel: "HIPP"                          # Hippocampus: posterior intracranial electrode
  sleep_stage: "NREM"                           # Analyze NREM sleep only

# --- Detection parameters (from paper methods) ---
detection:
  # Spindle detection (automated algorithm)
  spindle:
    bandpass_low: 12                            # Hz - spindle band low cutoff
    bandpass_high: 15                           # Hz - spindle band high cutoff
    min_duration: 0.5                           # seconds
    max_duration: 3.0                           # seconds
    threshold_sd: 2.0                           # Standard deviations above mean

  # Ripple detection (80-100 Hz)
  ripple:
    bandpass_low: 80                            # Hz - ripple band low cutoff
    bandpass_high: 100                          # Hz - ripple band high cutoff
    min_duration: 0.02                          # seconds (20 ms)
    max_duration: 0.5                           # seconds
    threshold_sd: 3.0                           # Standard deviations above mean
    
    # Key analysis: long vs short ripples
    duration_threshold: 0.07                    # seconds (70 ms) - paper threshold

# --- Time-frequency analysis ---
tfr:
  method: "morlet"                              # Wavelet method
  freqs_min: 1                                  # Hz
  freqs_max: 200                                # Hz
  n_freqs: 50                                   # Number of frequency bins
  n_cycles: 7                                   # Wavelet cycles
  time_window: [-1, 1]                          # seconds around ripple peak

# --- Coupling analysis ---
coupling:
  # Spindle band for coupling (12-15 Hz)
  spindle_band: [12, 15]                        
  
  # Coherence analysis window
  coherence_window: [-0.5, 0.5]                 # seconds around ripple peak
  coherence_freqs: [1, 40]                      # Hz range
  
  # Partial Directed Coherence (PDC) - directionality
  pdc_order: 10                                 # Model order for VAR
  pdc_window: [-0.2, 0.2]                       # seconds around ripple peak

# --- Statistical testing ---
stats:
  n_control_sets: 100                           # Number of shuffled control datasets
  alpha: 0.05                                   # Significance level
  correction: "fdr_bh"                          # False discovery rate (Benjamini-Hochberg)
  n_permutations: 1000                          # For permutation tests

# --- Visualization ---
plotting:
  dpi: 300                                      # Figure resolution
  format: "png"                                 # Output format
  style: "seaborn-v0_8-paper"                   # Matplotlib style
  figure_size: [8, 6]                           # inches (width, height)
  
  # Color schemes
  colors:
    long_ripples: "#E74C3C"                     # Red
    short_ripples: "#3498DB"                    # Blue
    hipp: "#2ECC71"                             # Green
    nc: "#9B59B6"                               # Purple
