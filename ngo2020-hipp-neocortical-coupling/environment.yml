name: ngo2020-repro
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Core scientific
  - numpy>=1.23
  - scipy>=1.9
  - pandas>=1.5
  # Signal processing
  - mne>=1.3
  - pywavelets>=1.4
  - scikit-learn>=1.1
  # Plotting
  - matplotlib>=3.6
  - seaborn>=0.12
  # Notebooks
  - jupyter
  - ipykernel
  # Utilities
  - tqdm
  - pyyaml
  - pip:
    - mne-connectivity>=0.4.0
    - mat73>=0.60
    - pingouin>=0.5.3
    - statsmodels>=0.13.0
    - loguru>=0.6.0
    - osfclient>=0.0.5
    - requests>=2.28.0
